<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Bliss | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #c4763a;
            --primary-light: #fdf2e9;
            --bg: #f8f7f4;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #757575;
            --border: #eeeeee;
            --success: #21a366;
            --warning: #f1a817;
            --danger: #df3c3c;
            --radius: 16px;
            --shadow: 0 4px 20px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: var(--card-bg);
            padding: 24px 32px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .logo-text { font-size: 22px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }

        /* STATS */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .stat-box:hover { transform: translateY(-5px); border-color: var(--primary); }
        .stat-val { font-size: 32px; font-weight: 800; margin-top: 8px; }
        .stat-label { font-size: 12px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        /* TABLE AREA */
        .table-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .table-toolbar {
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .booking-row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 120px 40px;
            padding: 18px 32px;
            border-bottom: 1px solid var(--border);
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .booking-row:hover { background: #fafafa; }
        .row-name { font-weight: 700; font-size: 15px; }
        .row-meta { font-size: 13px; color: var(--text-muted); }

        .status-pill {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 0.3px;
        }

        .pill-accepted { background: #e6f7ef; color: var(--success); }
        .pill-pending { background: #fff8e6; color: var(--warning); }
        .pill-declined { background: #fdeaea; color: var(--danger); }

        /* DRAWER */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(4px); z-index: 100; }
        .drawer {
            position: fixed; right: -450px; top: 0; bottom: 0; width: 450px;
            background: white; z-index: 101; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 40px; box-shadow: -10px 0 50px rgba(0,0,0,0.05);
        }
        .drawer.open { right: 0; }
        .overlay.open { display: block; }
        .drawer-close { position: absolute; top: 20px; right: 20px; border: none; background: none; font-size: 20px; cursor: pointer; color: #ccc; }

        .info-label { font-size: 10px; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 4px; }
        .info-val { font-weight: 600; font-size: 16px; margin-bottom: 20px; }

        .btn-group { display: flex; gap: 10px; margin-top: 30px; }
        .btn { flex: 1; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; border: 1px solid var(--border); font-family: inherit; }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-danger { background: #fff5f5; color: var(--danger); border: none; margin-top: 10px; width: 100%; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1a1a; color: white; padding: 12px 24px; border-radius: 50px; font-size: 14px; opacity: 0; transition: 0.3s; z-index: 1000; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <main>
        <div class="header">
            <div class="logo-text">✈️ TRAVEL BLISS ADMIN</div>
            <div style="display:flex; gap:15px;">
                <input type="text" id="search" placeholder="Find passenger..." oninput="handleSearch()" 
                       style="padding:10px 16px; border-radius:10px; border:1px solid var(--border); outline:none; width:280px;">
                <button onclick="fetchData()" style="padding:10px 20px; border-radius:10px; background:var(--primary-light); border:none; color:var(--primary); font-weight:700; cursor:pointer;">Refresh</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box" onclick="fetchData()">
                <div class="stat-label">Total Volume</div>
                <div class="stat-val" id="c-all">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Confirmed</div>
                <div class="stat-val" id="c-accepted" style="color: var(--success);">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Pending</div>
                <div class="stat-val" id="c-pending" style="color: var(--warning);">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Declined</div>
                <div class="stat-val" id="c-declined" style="color: var(--danger);">0</div>
            </div>
        </div>

        <div class="table-card">
            <div class="table-toolbar">
                <span style="font-weight: 800; font-size: 18px;">Live Bookings</span>
            </div>
            <div id="booking-list">
                </div>
        </div>
    </main>

    <div class="overlay" id="overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer">
        <button class="drawer-close" onclick="closeDrawer()">✕</button>
        <h2 id="d-name" style="margin-bottom: 30px; font-weight: 800;">---</h2>
        
        <div id="d-content">
            </div>

        <div class="btn-group">
            <button class="btn btn-primary" onclick="updateStatus('accepted')">Approve</button>
            <button class="btn" onclick="updateStatus('pending')">Pending</button>
        </div>
        <button class="btn" style="margin-top:10px; color: var(--danger);" onclick="updateStatus('declined')">Reject Booking</button>
        <button class="btn btn-danger" onclick="deleteBooking()">Delete Permanently</button>
    </div>

    <div id="toast"></div>

    <script>
        let bookings = [];
        let activeId = null;

        // --- DATE FORMATTER FUNCTION ---
        function formatDate(dateString) {
            if (!dateString) return "No Date";
            // Splits 2026-03-29T00:00:00.000Z at 'T' and takes the first part
            const dateOnly = dateString.split('T')[0]; 
            const dateObj = new Date(dateOnly);
            
            // Returns: March 29, 2026
            return dateObj.toLocaleDateString('en-US', { 
                month: 'long', 
                day: 'numeric', 
                year: 'numeric' 
            });
        }

        async function fetchData() {
            try {
                const res = await fetch('/api/bookings');
                bookings = await res.json();
                render(bookings);
                updateStats();
            } catch (e) { showToast("Network Error"); }
        }

        function updateStats() {
            document.getElementById('c-all').innerText = bookings.length;
            document.getElementById('c-accepted').innerText = bookings.filter(b => b.status === 'accepted').length;
            document.getElementById('c-pending').innerText = bookings.filter(b => b.status === 'pending').length;
            document.getElementById('c-declined').innerText = bookings.filter(b => b.status === 'declined').length;
        }

        function render(data) {
            const list = document.getElementById('booking-list');
            list.innerHTML = data.map(b => `
                <div class="booking-row" onclick="openDrawer('${b.id}')">
                    <div class="row-name">${b.name}</div>
                    <div class="row-meta">${b.place}</div>
                    <div class="row-meta">${formatDate(b.travel)}</div>
                    <div class="status-pill pill-${b.status}">${b.status}</div>
                    <div style="color: #ddd; text-align: right;">→</div>
                </div>
            `).join('');
        }

        window.handleSearch = () => {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = bookings.filter(b => b.name.toLowerCase().includes(q) || b.id.toLowerCase().includes(q));
            render(filtered);
        };

        window.openDrawer = (id) => {
            const b = bookings.find(x => x.id === id);
            activeId = id;
            document.getElementById('d-name').innerText = b.name;
            document.getElementById('d-content').innerHTML = `
                <div class="info-label">Booking ID</div><div class="info-val">${b.id}</div>
                <div class="info-label">Phone</div><div class="info-val">${b.phone}</div>
                <div class="info-label">Destination</div><div class="info-val">${b.place}</div>
                <div class="info-label">Travel Date</div><div class="info-val">${formatDate(b.travel)}</div>
                <div class="info-label">Notes</div><div class="info-val" style="font-style:italic;">${b.notes || 'None'}</div>
            `;
            document.getElementById('drawer').classList.add('open');
            document.getElementById('overlay').classList.add('open');
        };

        window.closeDrawer = () => {
            document.getElementById('drawer').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
        };

        window.updateStatus = async (s) => {
            await fetch(`/api/bookings/${activeId}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({status: s})
            });
            showToast("Updated to " + s);
            fetchData();
            closeDrawer();
        };

        window.deleteBooking = async () => {
            if(!confirm("Permenantly delete this record?")) return;
            await fetch(`/api/bookings/${activeId}`, {method: 'DELETE'});
            showToast("Record Deleted");
            fetchData();
            closeDrawer();
        };

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        fetchData();
    </script>
</body>
</html>
